name: harborstats

services:
  db:
    image: postgres:18
    container_name: harborstats-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: harborstats
    volumes:
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d harborstats"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: always

  web:
    container_name: harborstats-web
    build:
      context: ../web
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://postgres:postgres@db:5432/harborstats
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      ADMIN_SESSION_SECRET: ${ADMIN_SESSION_SECRET}
    ports:
      - "23413:3000"
    restart: always

  migrate:
    build:
      context: ../web
      target: migrator
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://postgres:postgres@db:5432/harborstats
    command: ["pnpm", "exec", "tsx", "scripts/migrate.ts"]
    profiles: ["migrate"]
    restart: "no"

  baseline:
    build:
      context: ../web
      target: migrator
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://postgres:postgres@db:5432/harborstats
    command: ["pnpm", "exec", "tsx", "scripts/baseline.ts"]
    profiles: ["migrate"]
    restart: "no"

  pgadmin:
    image: dpage/pgadmin4
    container_name: harborstats-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      db:
        condition: service_healthy
    restart: always

volumes:
  pgdata:
