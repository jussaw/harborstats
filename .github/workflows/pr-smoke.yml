name: PR Smoke

on:
  pull_request:
    paths:
      - '.github/workflows/**'
      - 'web/**'

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: harborstats
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      CI: true
      DATABASE_URL: postgres://postgres:postgres@127.0.0.1:5432/harborstats_test
      ADMIN_PASSWORD: harborstats-test-password
      ADMIN_SESSION_SECRET: harborstats-test-session-secret-please-change
      TEST_BASE_URL: http://127.0.0.1:3100
      TZ: UTC

    defaults:
      run:
        working-directory: web

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Build
        run: pnpm build

      - name: Fast tests
        run: pnpm test:fast

      - name: Integration tests
        run: pnpm test:integration

      - name: Playwright smoke (isolated dev server)
        run: pnpm exec playwright test tests/e2e/smoke.spec.ts
